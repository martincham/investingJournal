utilisation:
  dram:
    value: {2018: 0.97, 2019: 0.88, 2020: 0.92, 2021: 0.97, 2022: 0.90,
            2023: 0.76, 2024: 0.93, 2025: 0.95, 2026: 0.97, 2028: 0.97, 2032: 0.96}
    unit: fraction
    source: https://www.trendforce.com/presscenter/news/20251113-12780.html
    confidence: medium
    notes: >
      The 2023 trough (~0.76) is the deliberate industry-wide production cut that
      ended the 2022-23 glut. It is the single most important thing the backcast has
      to reproduce: a model that cannot show the 2023 cut has not understood that
      memory supply is a decision, not just a physical ceiling. 2026+ is effectively
      pinned at max -- in a shortage, everyone runs flat out.
  nand:
    value: {2018: 0.95, 2019: 0.85, 2020: 0.90, 2021: 0.95, 2022: 0.88,
            2023: 0.70, 2024: 0.88, 2025: 0.93, 2026: 0.96, 2028: 0.96, 2032: 0.95}
    unit: fraction
    source: https://www.isaiahresearch.com/Insight/Detail/105
    confidence: low

# S3. The shrink tax. Migrating a line to a smaller node COSTS you wafer starts:
# more process steps and more litho passes mean longer cycle time, so the same
# toolset yields fewer wafer-outs per month. This is why bit growth is always less
# than density growth, and it is routinely left out of naive models.
node_conversion_loss:
  dram:
    value: {2018: 0.03, 2022: 0.04, 2025: 0.05, 2026: 0.06, 2028: 0.07, 2030: 0.08, 2032: 0.09}
    unit: fraction_of_capacity_lost
    source: DERIVED
    confidence: low
    notes: >
      Rises over time because each successive DRAM node adds more steps for less
      density. Calibrated so that 2026 net bit growth lands inside TrendForce's
      guided 10-15% band given the wafer and density assumptions.
  nand:
    value: {2018: 0.02, 2025: 0.03, 2028: 0.04, 2032: 0.05}
    unit: fraction_of_capacity_lost
    source: DERIVED
    confidence: low

# S7. Stochastic disruption. Off by default; a scenario lever, not a forecast.
disruption_haircut:
  value: {2018: 0.0, 2032: 0.0}
  unit: fraction
  source: DERIVED
  confidence: low
  notes: >
    Fire / earthquake / power-outage. Historically the industry loses a few percent
    of a year's output to one of these roughly once every 3-4 years (Hsinchu 2021,
    Xi'an 2021, Kioxia Yokkaichi 2019). Left at zero so the base case is not
    quietly assuming an accident; raise it in the Tight scenario.
