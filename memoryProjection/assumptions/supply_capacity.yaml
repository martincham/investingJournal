# S1-S8: Installed wafer capacity, fab pipeline, utilisation.
#
# Capacity is given as year anchors in kWSPM (thousand 300mm wafer starts per month)
# and interpolated onto quarters by model/calendar.py:interpolate_annual. Greenfield
# fabs are NOT step functions -- the interpolation plus the S-curve ramp in
# calendar.py is what spreads a new fab's output across the 12-16 quarters it
# actually takes to go from first output to full volume.
#
# 2025 anchor totals (DRAM): Samsung 720 + SK 595 + Micron 385 + CXMT 265 + other 75
#                            = 2,040 kWSPM. This is the load-bearing base year.

dram_wafer_capacity_kwspm:
  samsung:
    value: {2018: 430, 2020: 470, 2022: 550, 2024: 640, 2025: 720, 2026: 780,
            2027: 840, 2028: 900, 2030: 1000, 2032: 1080}
    unit: kwspm
    source: https://semiconductorx.com/fabs-dram.php
    confidence: medium
    notes: >
      ~720 kWSPM end-2025. P4/P5 Pyeongtaek phases drive the out-years. Samsung can
      shift P-line capacity between foundry and DRAM (S4), which makes these the
      widest error bars of the big three -- the out-years are the model's assumption,
      not Samsung's guidance.

  sk_hynix:
    value: {2018: 340, 2020: 380, 2022: 420, 2024: 500, 2025: 595, 2026: 620,
            2027: 670, 2028: 720, 2030: 820, 2032: 900}
    unit: kwspm
    source: https://x.com/Jukanlosreve/status/1973531213295190294
    confidence: medium
    notes: >
      SK Hynix guided DRAM wafer input to the 600k/month range in 2H2026 (~620).
      M15X Cheongju is the near-term add; the Yongin cluster's first fab is the
      2027-28 step. Highest HBM mix of any producer.

  micron:
    value: {2018: 300, 2020: 330, 2022: 350, 2024: 365, 2025: 385, 2026: 420,
            2027: 470, 2028: 520, 2030: 640, 2032: 720}
    unit: kwspm
    source: https://www.trendforce.com/presscenter/news/20251113-12780.html
    confidence: medium
    notes: >
      TrendForce notes Micron is "waiting for its new ID1 fab" to come online -- i.e.
      Micron adds almost nothing in 2026 and its step-up is a 2027/28 event (Boise
      ID1 then ID2, plus Hiroshima). Clay NY is 2030+. This lag is exactly the
      "new fab capacity late-27/28" point in the thesis, and it is why the supply
      line cannot bend before then no matter what capex does.

  cxmt:
    value: {2018: 0, 2020: 40, 2022: 100, 2024: 200, 2025: 265, 2026: 350,
            2027: 420, 2028: 500, 2030: 620, 2032: 700}
    unit: kwspm
    source: https://newsletter.semianalysis.com/p/chinas-cxmt-is-set-to-challenge-dram
    confidence: medium
    notes: >
      ~265 kWSPM end-2025 -> ~350 end-2026 -> ~420 in 2027 -> ~500 by 2028 (~17% of
      global DRAM capacity). NOTE: per china.yaml this output is treated as CAPTIVE to
      Chinese domestic demand. It raises global supply and global demand by the same
      amount and therefore does not close the global gap. No EUV access (export
      controls) forces DUV multipatterning, which is why its bit output per wafer is
      well below the leading edge -- see tech_roadmap.cxmt_density_discount.

  other:
    value: {2018: 130, 2020: 110, 2022: 95, 2024: 82, 2025: 75, 2026: 72,
            2028: 68, 2030: 62, 2032: 58}
    unit: kwspm
    source: https://en.unibetter-ic.com/top-dram-manufacturers/
    confidence: low
    notes: Nanya, Winbond, PSMC. Niche/legacy DRAM, slowly shrinking.

