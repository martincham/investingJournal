# D19. Only visible at quarterly resolution. Consumer builds ahead of holiday, so
# Q3/Q4 pull bits forward; Q1 is the hangover. Multipliers average to 1.0 over a year.
seasonality:
  consumer_quarterly_multiplier:
    value: {1: 0.92, 2: 0.98, 3: 1.08, 4: 1.02}
    unit: multiplier
    source: DERIVED
    confidence: medium
    notes: Applied to PC, smartphone, console and graphics only. Datacenter does not
      have a holiday season.

# S30. INVENTORY. A stock, not a flow -- and the mechanism without which the backcast
# simply does not work.
#
# Customers and the channel buy ahead when they are frightened and stop buying when
# they are full. That swing is a real component of demand in any given quarter, and it
# is what actually drives the memory cycle's amplitude. Positive = restocking (adds to
# demand). Negative = destocking (subtracts).
#
# The model was built without this at first, and the 2018-2025 backcast promptly
# showed 2019 and 2023 as SHORTAGES when both were historic gluts. That failure is
# what this series exists to fix, and it is the reason the backcast is worth running:
# a model that cannot reproduce the crashes has no business projecting the shortages.
inventory_swing:
  dram_eb_per_year:
    value: {2018: 1.0, 2019: -4.5, 2020: -1.0, 2021: 3.5, 2022: -4.0, 2023: -7.5,
            2024: -1.5, 2025: 0.5, 2026: 1.5, 2027: 1.0, 2028: 0.0, 2029: 0.0,
            2030: 0.0, 2031: 0.0, 2032: 0.0}
    unit: exabytes_per_year
    source: https://www.trendforce.com/presscenter/news/20251126-12802.html
    confidence: medium
    notes: >
      The cycle, made explicit. 2018 hoarding into the price peak; the 2019 destock;
      2021 double-ordering during the chip crisis; the great 2022-23 destock that
      produced the worst glut in the industry's history; and the 2024-25 drawdown that
      leaves suppliers' inventories "almost depleted" (TrendForce, Nov 2025) with
      nothing left to cushion 2026.
      Held at ZERO from 2028 -- projecting a restocking cycle would be inventing a
      demand signal, and it would flatter the gap. The out-year result should not
      depend on it.
  nand_eb_per_year:
    value: {2018: 20, 2019: -60, 2020: -20, 2021: 70, 2022: -100, 2023: -120,
            2024: -30, 2025: 10, 2026: 30, 2027: 20, 2028: 0.0, 2030: 0.0, 2032: 0.0}
    unit: exabytes_per_year
    source: DERIVED
    confidence: low
    notes: Same cycle, same logic, NAND's larger bit scale.

# D22. A genuine bear lever: pooling raises utilisation of ALREADY-INSTALLED DRAM,
# which reduces demand for NEW DRAM. Cuts against the shortage thesis.
cxl_pooling_savings:
  value: {2025: 0.00, 2026: 0.01, 2027: 0.02, 2028: 0.035, 2029: 0.05, 2030: 0.065,
          2031: 0.08, 2032: 0.09}
  unit: fraction_of_server_dram_demand_avoided
  source: DERIVED
  confidence: speculative
  notes: Applied to server DRAM demand (traditional + AI host).
