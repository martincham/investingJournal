# D12-D19, D21-D23: non-AI demand -- the segments that get crowded out.
#
# IMPORTANT, and easy to get wrong: the GB/unit series below are TREND content, i.e.
# what OEMs would fit at CONSTANT 2025 REAL PRICES. They are NOT the cut-down
# configurations OEMs are actually shipping in 2026 while memory is unaffordable.
#
# That is the whole point of the demand line's definition (see 00-plan.md section 0).
# Realised 2026 PC and phone content is being cut BECAUSE of the shortage -- that is
# the shortage doing its work, not demand being absent. Feeding realised content back
# in as "demand" would define the gap out of existence: the market always clears, so
# a model built on realised shipments would show supply = demand forever and prove
# nothing.

servers_traditional:
  units_millions:
    value: {2018: 11.5, 2019: 11.0, 2020: 12.2, 2021: 13.1, 2022: 13.8, 2023: 11.9,
            2024: 12.5, 2025: 13.2, 2026: 13.8, 2027: 14.3, 2028: 14.8, 2030: 15.6,
            2032: 16.4}
    unit: millions_of_units_per_year
    source: DERIVED
    confidence: low
    notes: >
      Non-AI servers. Flattish units; the growth is all in content. The 2023 dip is
      real and load-bearing -- enterprise server units fell hard that year as budgets
      rotated to AI, and it is part of why 2023 was a glut.
  dram_gb_per_unit:
    value: {2018: 315, 2020: 430, 2022: 600, 2024: 830, 2025: 1000, 2026: 1190,
            2027: 1390, 2028: 1600, 2029: 1830, 2030: 2075, 2031: 2330, 2032: 2600}
    unit: gigabytes
    source: DERIVED
    confidence: low
    notes: >
      Core counts keep climbing and each core wants its own memory channel capacity;
      DDR5 -> MRDIMM extends this. THE LARGEST SINGLE DRAM POOL: server DRAM
      (traditional + AI host) is ~35-40% of all DRAM bits, which is the cross-check
      this series is calibrated against. Getting it too low was the model's first
      calibration error -- it made 2025/26 look oversupplied when the market was in
      fact in severe shortage.
  nand_tb_per_unit:
    value: {2018: 6, 2020: 9, 2022: 14, 2024: 20, 2025: 25, 2026: 29, 2028: 42,
            2030: 57, 2032: 76}
    unit: terabytes
    source: DERIVED
    confidence: low
    notes: Enterprise SSD. Datacentre is the dominant NAND pool, not consumer.

