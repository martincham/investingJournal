# ---------------------------------------------------------------------------
# AI accelerator units, quarterly, millions. The demand driver.
# ---------------------------------------------------------------------------
accelerator_units_millions_per_quarter:
  value:
    2025Q1: 3.0
    2025Q2: 3.3
    2025Q3: 3.7
    2025Q4: 4.0
    2026Q1: 4.2
    2026Q2: 4.5
  unit: millions_of_units
  source: https://www.sec.gov/Archives/edgar/data/0001045810/000104581026000051/q1fy27cfocommentary.htm
  confidence: medium
  notes: >
    Anchored on NVIDIA's reported Data Center COMPUTE revenue (networking excluded, as
    it buys no HBM): a record $60.4bn in the quarter ended 26 Apr 2026, +18% QoQ and
    +77% YoY. At a ~$28k blended ASP that is ~2.2M NVIDIA accelerators in the quarter.
    Grossed up for Google TPU, AWS Trainium, AMD MI-series, Meta MTIA, Microsoft Maia
    and Huawei Ascend -- roughly 2x NVIDIA's unit count, since the merchant ASICs are
    far cheaper per unit -- gives ~4.5M/quarter, i.e. ~18M/yr in 2026.
    Note NVIDIA shipped NO Data Center Hopper to China in the quarter (vs $4.6bn a year
    earlier), which is part of why Chinese domestic AI demand is served domestically --
    see china.yaml.

# ---------------------------------------------------------------------------
# Conventional unit shipments, quarterly, millions. All directly reported.
# ---------------------------------------------------------------------------
pc_units_millions_per_quarter:
  value:
    2025Q1: 63.2
    2025Q2: 68.4
    2025Q3: 75.8
    2025Q4: 68.0
    2026Q1: 65.6
    2026Q2: 66.5
  unit: millions_of_units
  source: https://counterpointresearch.com/en/insights/global-pc-shipments-q1-2026
  confidence: high
  notes: >
    1Q26 = 65.6M, +3% YoY (IDC). Gartner says 62.8M (+4%), Counterpoint 63.3M (+3.2%);
    IDC's figure is used and the others bracket it.
    IMPORTANT for reading the demand line: IDC attributes the growth to PULL-FORWARD --
    buyers accelerating purchases ahead of memory-driven price rises and shortages.
    That is demand being dragged out of the future, not created. 2026Q2 is preliminary.

smartphone_units_millions_per_quarter:
  value:
    2025Q1: 302.5
    2025Q2: 295.0
    2025Q3: 320.0
    2025Q4: 331.0
    2026Q1: 296.0
    2026Q2: 288.0
  unit: millions_of_units
  source: https://www.fonearena.com/blog/480087/global-smartphone-shipments-q1-2026-idc.html
  confidence: high
  notes: >
    1Q26: IDC says 293.8M (-2.9% YoY); Omdia says 298.5M (+1%). The 296M used here
    splits them. IDC explicitly attributes the decline to MEMORY CONSTRAINTS, and both
    firms note vendor front-loading ahead of component inflation.
    This is the crowd-out happening in real time: phone makers cannot get the DRAM, so
    they ship fewer phones and cut memory content in the ones they do ship. It is the
    clearest observable evidence that the gap is real -- and it is also exactly why the
    demand line must use TREND content rather than these rationed outcomes.

